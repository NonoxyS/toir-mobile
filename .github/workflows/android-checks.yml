name: Android Checks

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report
          path: build/reports/detekt/detekt.html
          retention-days: 1

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs: detekt
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Run Android Lint
        run: ./gradlew :android:app:lintProdDebug

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-prodDebug.html
          retention-days: 1
